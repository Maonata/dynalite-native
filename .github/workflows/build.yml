name: Build Dynalite APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" --sdk_root=$ANDROID_SDK_ROOT

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Verify Gradle
        run: gradle --version

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Find and upload APK
        run: |
          APK=$(find . -name "app-debug.apk" | head -1)
          if [ -n "$APK" ]; then
            echo "✅ APK: $APK ($(du -sh $APK | cut -f1))"
            cp "$APK" ./dynalite-control.apk
          else
            echo "❌ APK no encontrada"
            find . -name "*.apk"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dynalite-control-apk
          path: dynalite-control.apk
          retention-days: 30
